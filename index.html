<!DOCTYPE html>
<html lang = 'en'>
  <head>
    <title>YZ | Calculator</title>
    <meta charset = "UTF-8">
    <link rel = 'stylesheet' href = "styles.css">
  </head>
  <body>
    <div class = "container">
      <div class = "visual">
      </div> <!--visual div end-->
      <div class = "top-row">
        <button class = "ac">AC</button>
        <button class = "negate">+/-</button>
        <button class = "percent">%</button>
        <button class = "division">÷</button> <!-- divs per row-->
      </div><!--top-row div end -->
      <div class = "second-row">
        <button class = "seven">7</button>
        <button class = "eight">8</button>
        <button class = "nine">9</button>
        <button class = "multiplication">×</button> <!-- divs per row-->
      </div><!--second-row div end -->
      <div class = "third-row">
        <button class = "four">4</button>
        <button class = "five">5</button>
        <button class = "six">6</button>
        <button class = "subtraction">-</button> <!-- divs per row-->
      </div><!--third-row div end -->
      <div class = "fourth-row">
        <button class = "one">1</button>
        <button class = "two">2</button>
        <button class = "three">3</button>
        <button class = "addition">+</button> <!-- divs per row-->
      </div><!--fourth-row div end -->
      <div class = "fifth-row">
        <button class = "zero">0</button>
        <button class = "decimal">.</button>
        <button class = "equal">=</button> <!-- divs per row-->
      </div><!--fifth-row div end -->
    </div><!--container div end-->
  </body>
  <script src = "script.js"></script>
</html>
